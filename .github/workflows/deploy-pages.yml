name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/deploy-pages.yml"
  # Lets a maintainer redeploy on demand (e.g. after a custom-domain/DNS change) without an
  # unrelated website commit.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one live deployment at a time; a newer push should win over an older one still building,
# not queue behind it.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: website/.nvmrc
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          # Real production origin (docs/998-roadmap.md's Social pillar's own website, served
          # from try-hyperion.org, not a github.io/<repo> subpath) -- see lib/seo.ts's own doc
          # comment on why this isn't a hardcoded fallback.
          NEXT_PUBLIC_SITE_URL: https://try-hyperion.org
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
