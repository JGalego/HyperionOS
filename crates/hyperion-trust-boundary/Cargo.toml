[package]
name = "hyperion-trust-boundary"
version = "0.3.0"
edition.workspace = true
license.workspace = true
description = "Real, kernel-enforced Trust Boundaries (docs/998-roadmap.md M2): rehosts hyperion-capability's token/revocation algorithm so minting, deriving, and revoking a capability has a real effect on a real Linux process via namespaces, seccomp-bpf, and Landlock."

[dependencies]
hyperion-capability = { workspace = true }
libc = { workspace = true }
thiserror = { workspace = true }

# Linux-only: both crates compile real syscall numbers/ABI constants (Landlock, seccomp-bpf) that
# simply don't exist on macOS -- confirmed the hard way (2026-07-12 CI: `cargo build --workspace
# --all-targets` on macos-latest failed to compile `landlock`/`seccompiler` themselves, not just
# this crate's use of them). A `[target.'cfg(...)']` section keeps them out of the macOS build
# graph entirely rather than trying to make Linux-only crates cross-compile.
[target.'cfg(target_os = "linux")'.dependencies]
landlock = "0.4"
seccompiler = "0.5"

[dev-dependencies]
tempfile = { workspace = true }
