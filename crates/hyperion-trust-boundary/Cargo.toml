[package]
name = "hyperion-trust-boundary"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "Real, kernel-enforced Trust Boundaries (PRODUCTION_BOOT_PROMPT.md M2): rehosts hyperion-capability's token/revocation algorithm so minting, deriving, and revoking a capability has a real effect on a real Linux process via namespaces, seccomp-bpf, and Landlock."

[dependencies]
hyperion-capability = { workspace = true }
libc = { workspace = true }
thiserror = { workspace = true }
landlock = "0.4"
seccompiler = "0.5"

[dev-dependencies]
tempfile = { workspace = true }
