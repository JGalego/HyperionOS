[package]
name = "hyperion-shell"
version = "0.2.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Real visual shell: renders hyperion-workspace's compiled WorkspaceGraph/AccessibilityTree as an adaptive, AccessKit-backed canvas -- the visual sibling of hyperion-console's real text rendering, not a second UI model."

[[bin]]
name = "hyperion-shell"
path = "src/main.rs"

[dependencies]
hyperion-agent-runtime = { workspace = true }
hyperion-ai-runtime = { workspace = true }
hyperion-capability = { workspace = true }
hyperion-context = { workspace = true }
hyperion-coordination = { workspace = true }
hyperion-crypto = { workspace = true }
hyperion-intent = { workspace = true }
hyperion-knowledge-graph = { workspace = true }
hyperion-workspace = { workspace = true }
serde_json = { workspace = true }
# Pure-Rust GUI + windowing; "accesskit" is what turns hyperion-workspace's own
# AccessibilityNode tree into a real OS accessibility tree (NVDA/VoiceOver/Orca), not a
# terminal-only simulation of one -- see this crate's lib.rs doc comment.
eframe = { version = "0.29", features = ["accesskit"] }
# Same version eframe re-exports as `eframe::egui` -- declared directly too so app.rs can write
# `egui::Foo` rather than `eframe::egui::Foo` everywhere.
egui = "0.29"

[dev-dependencies]
tempfile = { workspace = true }
