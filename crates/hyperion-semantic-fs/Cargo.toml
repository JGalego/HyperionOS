[package]
name = "hyperion-semantic-fs"
version = "0.3.0"
edition.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
hyperion-capability = { workspace = true }
hyperion-context = { workspace = true }
hyperion-events = { workspace = true }
hyperion-knowledge-graph = { workspace = true }
# `NodeId` is a type alias for `hyperion_storage::ObjectId` -- a type alias doesn't carry the
# tuple-struct constructor under the alias name, so reconstructing one from a raw wire event's u64
# (see `SemanticFilesystem::drain_invalidations`) needs the real underlying type.
hyperion-storage = { workspace = true }
hyperion-workspace = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
