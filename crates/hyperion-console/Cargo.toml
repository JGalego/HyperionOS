[package]
name = "hyperion-console"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "Real text console: a typed utterance drives the real Intent Engine, real Agent invocation, and hyperion-workspace's real compiled accessibility tree, rendered as real text (PRODUCTION_BOOT_PROMPT.md M7, stage 1)."

[[bin]]
name = "hyperion-console"
path = "src/main.rs"

[dependencies]
hyperion-agent-runtime = { workspace = true }
hyperion-capability = { workspace = true }
hyperion-context = { workspace = true }
hyperion-coordination = { workspace = true }
hyperion-intent = { workspace = true }
hyperion-knowledge-graph = { workspace = true }
hyperion-workspace = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
